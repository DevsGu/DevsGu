name: Generate Profile Widgets (snake, trophy, stats, streak)

on:
  schedule:
    - cron: "0 0 * * *" # roda 1x por dia, à meia-noite (UTC)
  workflow_dispatch: {} # permite rodar manualmente pelo botão "Run workflow"
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: DevsGu
          outputs: dist/github-contribution-grid-snake.svg

      - name: Generate trophy.svg (self-hosted, não depende de serviço externo)
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: DevsGu
          output_path: dist/trophy.svg
          theme: radical
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats.svg (self-hosted, não depende de serviço externo)
        uses: cicirello/user-statistician@v1
        with:
          user: DevsGu
          template: dark
          output: dist/stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak.svg (self-hosted, não depende de serviço externo)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=DevsGu&theme=dark&hide_border=true&ring=A855F7&fire=8E2DE2
          path: dist/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
