name: Generate Profile Widgets (snake, isocalendar, stats, streak)

on:
  schedule:
    - cron: "0 0 * * *" # roda 1x por dia, à meia-noite (UTC)
  workflow_dispatch: {} # permite rodar manualmente pelo botão "Run workflow"
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p dist

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: DevsGu
          outputs: dist/github-contribution-grid-snake.svg

      - name: Generate isocalendar.svg (calendário isométrico de contribuições)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: dist/isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Generate stats.svg (self-hosted, não depende de serviço externo)
        uses: cicirello/user-statistician@v1
        with:
          image-file: dist/stats.svg
          colors: dark
          commit-and-push: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak.svg (self-hosted, não depende de serviço externo)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=DevsGu&theme=dark&hide_border=true&ring=A855F7&fire=8E2DE2
          path: dist/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
